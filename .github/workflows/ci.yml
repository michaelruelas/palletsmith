name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Check out palletsmith-plugins
        uses: actions/checkout@v4
        with:
          repository: michaelruelas/palletsmith-plugins
          path: ../palletsmith-plugins

      - name: Build palletsmith-plugins
        working-directory: ../palletsmith-plugins
        run: bun install --frozen-lockfile && bun run build

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Check out palletsmith-plugins
        uses: actions/checkout@v4
        with:
          repository: michaelruelas/palletsmith-plugins
          path: palletsmith-plugins

      - name: Link palletsmith-plugins to sibling path
        run: ln -s $PWD/palletsmith-plugins $PWD/../palletsmith-plugins

      - name: Build palletsmith-plugins
        working-directory: ../palletsmith-plugins
        run: bun install --frozen-lockfile && bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
