<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalletSmith Benchmark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 2rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #e6edf3; }
  .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; }
  .subtitle span { margin-right: 1.5rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { padding: 0.6rem 0.8rem; text-align: center; border: 1px solid #21262d; }
  th { background: #161b22; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; }
  th:first-child { text-align: left; }
  td:first-child { text-align: left; font-weight: 500; }
  td:first-child .appearance { font-weight: 400; font-size: 0.75rem; color: #8b949e; margin-left: 0.5rem; }
  tr:hover td { background: #1c2128; }
  .score { font-weight: 700; font-size: 1.1rem; }
  .score-na { color: #484f58; }
  .coverage { font-size: 0.75rem; color: #8b949e; margin-top: 0.15rem; }
  .grid-container { overflow-x: auto; }
  .legend { display: flex; gap: 1.5rem; margin-top: 1.5rem; font-size: 0.8rem; color: #8b949e; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  footer { margin-top: 2rem; font-size: 0.75rem; color: #484f58; }
  .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.4rem; }
</style>
</head>
<body>
<h1>PalletSmith Benchmark</h1>
<div class="subtitle">
  <span id="generated-at"></span>
  <span id="commit"></span>
</div>
<div class="grid-container">
  <table id="grid">
    <thead>
      <tr>
        <th>Theme</th>
        <th vscode>VSCode</th>
        <th zed>Zed</th>
        <th ghostty>Ghostty</th>
        <th chrome>Chrome</th>
        <th openchamber>OpenChamber</th>
      </tr>
    </thead>
    <tbody id="grid-body"></tbody>
  </table>
</div>
<div class="legend">
  <span>Closeness:</span>
  <div class="legend-item"><div class="legend-swatch" style="background:#3fb950"></div> ≥70%</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#d29922"></div> 40–69%</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f85149"></div> &lt;40%</div>
  <div class="legend-item" style="margin-left:1rem"><span>Coverage:</span></div>
  <div class="legend-item"><div class="legend-swatch" style="background:#58a6ff"></div> keys count</div>
</div>
<footer>Results regenerated on each push to main</footer>
<script>
async function load() {
  const res = await fetch("results.json");
  const data = await res.json();

  document.getElementById("generated-at").textContent = "Updated: " + new Date(data.generatedAt).toLocaleString();
  document.getElementById("commit").textContent = "Commit: " + (data.commit?.slice(0, 7) || "unknown");

  const tbody = document.getElementById("grid-body");
  const appOrder = ["vscode", "zed", "ghostty", "chrome", "openchamber"];

  for (const r of data.results) {
    const tr = document.createElement("tr");

    const themeCell = document.createElement("td");
    themeCell.innerHTML = `${r.theme} <span class="appearance">${r.appearance}</span>`;
    tr.appendChild(themeCell);

    for (const appId of appOrder) {
      const app = r.apps[appId];
      const td = document.createElement("td");

      if (!app) {
        td.innerHTML = '<span class="score score-na">—</span>';
      } else if (app.comparison) {
        const c = app.comparison;
        const closeness = c.overallCloseness;
        const statusClass = closeness >= 70 ? "#3fb950" : closeness >= 40 ? "#d29922" : "#f85149";
        td.innerHTML = `<div><span class="score" style="color:${statusClass}">${closeness}%</span></div>`;
        let details = `${c.exactCount} exact`;
        if (c.nearCount > 0) details += `, ${c.nearCount} near`;
        if (c.closeCount > 0) details += `, ${c.closeCount} close`;
        td.innerHTML += `<div class="coverage">${details} / ${c.total} common</div>`;
        td.innerHTML += `<div class="coverage">μ=${c.meanDistance} σ=${c.stdDevDistance}</div>`;
      } else {
        td.innerHTML = `<div><span class="score" style="color:#58a6ff">${app.keys}</span></div>`;
        td.innerHTML += `<div class="coverage">keys</div>`;
      }

      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }
}

load();
</script>
</body>
</html>
